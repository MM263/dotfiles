add_newline = true
command_timeout = 500

format = "$directory$git_branch$git_commit$git_state$git_status$line_break$character"
right_format = "$status$cmd_duration$jobs$direnv$mise$nodejs$python$rust$golang$lua$kubernetes$aws$gcloud$username$hostname$time"

[character]
success_symbol = "[▸](bold green)"
error_symbol = "[▸](bold red)"
vimcmd_symbol = "[❮](bold green)"
vimcmd_visual_symbol = "[V](bold green)"
vimcmd_replace_symbol = "[▶](bold green)"
vimcmd_replace_one_symbol = "[▶](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = false
fish_style_pwd_dir_length = 1
style = "bold blue"
read_only = " !"
read_only_style = "bold yellow"

[git_branch]
symbol = ""
style = "bold green"
format = " on [$branch]($style)"

[git_commit]
commit_hash_length = 8
tag_disabled = false
style = "bold green"
format = " [@$hash$tag]($style)"

[git_state]
style = "bold red"
format = " [$state( $progress_current/$progress_total)]($style)"

[git_status]
style = "bold yellow"
format = "([ $all_status$ahead_behind]($style))"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
conflicted = "~${count}"
deleted = "x${count}"
modified = "!${count}"
renamed = "»${count}"
staged = "+${count}"
stashed = "*${count}"
untracked = "?${count}"

[status]
disabled = false
symbol = "✘"
style = "bold red"
format = "[$symbol$status]($style) "
pipestatus = true

[cmd_duration]
min_time = 3000
show_milliseconds = false
style = "bold bright-black"
format = "took [$duration]($style) "

[jobs]
symbol = ""
style = "bold green"
format = "[$number]($style) "

[direnv]
disabled = false

[username]
show_always = false
style_user = "bold yellow"
style_root = "bold yellow"
format = "with [$user]($style)"

[hostname]
ssh_only = true
style = "bold yellow"
format = "[@$hostname]($style) "

[time]
disabled = false
style = "bold blue"
time_format = "%H:%M:%S"
format = "at [$time]($style)"
